{% extends "base.html" %}
{% block title %}登入{% endblock %}
{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto;">
  <h1 style="margin-top:0;">登入</h1>
  <form method="post">
    {{ form.csrf_token }}
    <div style="margin-bottom: 12px;">
      <label>{{ form.username.label }}</label><br>
      {{ form.username(style="width:100%;") }}
    </div>
    <div style="margin-bottom: 12px;">
      <label>{{ form.password.label }}</label><br>
      {{ form.password(style="width:100%;") }}
    </div>
    {{ form.submit() }}
  </form>
</div>
{% endblock %}
