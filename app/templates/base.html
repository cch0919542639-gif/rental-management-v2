<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}租屋管理重構版{% endblock %}</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background: #f4f6f8; color: #1f2933; }
    header { background: #0f172a; color: #fff; padding: 16px 24px; display: flex; justify-content: space-between; }
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    a { color: #2563eb; text-decoration: none; }
    .card { background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .flash { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; }
    .flash-danger { background: #fee2e2; color: #991b1b; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
    th { background: #f8fafc; }
    form.inline { display: inline-flex; gap: 8px; align-items: center; }
    input, button { padding: 10px 12px; border-radius: 8px; border: 1px solid #cbd5e1; }
    button { background: #0f766e; color: #fff; border: 0; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <div><strong>租屋管理重構版</strong></div>
    <nav>
      {% if current_user.is_authenticated %}
      <a href="{{ url_for('dashboard.dashboard_home') }}" style="color:#fff; margin-right:16px;">儀表板</a>
      <a href="{{ url_for('billing.billing_list') }}" style="color:#fff; margin-right:16px;">帳單</a>
      <a href="{{ url_for('payments.payment_list') }}" style="color:#fff; margin-right:16px;">付款</a>
      <a href="{{ url_for('electricity.electricity_dashboard') }}" style="color:#fff; margin-right:16px;">電費</a>
      <a href="{{ url_for('water.water_list') }}" style="color:#fff; margin-right:16px;">水費</a>
      <a href="{{ url_for('reports.report_index') }}" style="color:#fff; margin-right:16px;">報表</a>
      <a href="{{ url_for('maintenance.maintenance_index') }}" style="color:#fff; margin-right:16px;">維修</a>
      <a href="{{ url_for('landlords.landlord_list') }}" style="color:#fff; margin-right:16px;">房東</a>
      <a href="{{ url_for('properties.property_list') }}" style="color:#fff; margin-right:16px;">物件</a>
      <a href="{{ url_for('rooms.room_list') }}" style="color:#fff; margin-right:16px;">房間</a>
      <a href="{{ url_for('tenants.tenant_list') }}" style="color:#fff; margin-right:16px;">房客</a>
      <a href="{{ url_for('contracts.contract_list') }}" style="color:#fff; margin-right:16px;">合約</a>
      <a href="{{ url_for('auth.logout') }}" style="color:#fff;">登出</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
